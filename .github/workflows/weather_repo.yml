name: wx天气预报推送
QWEATHER_GEO_HOST: https://geoapi.qweather.com
QWEATHER_API_HOST: https://devapi.qweather.com
on:
  schedule:
    - cron: '*/5 * * * *'   # GitHub Actions 最短约每5分钟一次
    # - cron: '30 12 * * *' # 如需固定北京时间20:30（UTC 12:30）可保留
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Say hello to your girlfriend every day

    # ✅ 正确：job 级别 env（所有 steps 都能读到）
    env:
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      TEMPLATE_ID_DAY: ${{ secrets.TEMPLATE_ID_DAY }}
      TEMPLATE_ID_NIGHT: ${{ secrets.TEMPLATE_ID_NIGHT }}
      USER_IDS: ${{ secrets.USER_IDS }}
      START_DATE: ${{ secrets.START_DATE }}
      NAME: ${{ secrets.NAME }}
      BIRTHDAY: ${{ secrets.BIRTHDAY }}
      CITY: ${{ secrets.CITY }}
      # 可选：如果你希望显式指定和风 host
      QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather
        run: |
          python main.py
